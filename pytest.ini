[pytest]
addopts = -q
testpaths = tests/python
filterwarnings =
    # Keep DeprecationWarnings from polygon/websockets visible
    always::DeprecationWarning:polygon\.
    always::DeprecationWarning:websockets\.
    # Silence other third-party DeprecationWarnings to reduce noise
    ignore::DeprecationWarning
    # Ignore runpy warning in CLI module execution tests
    ignore:'scripts.cli' found in sys.modules after import of package 'scripts':RuntimeWarning
