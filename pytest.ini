[pytest]
pythonpath = .
addopts = -q
testpaths = tests/python
filterwarnings =
    # Ignore third-party DeprecationWarnings
    ignore::DeprecationWarning:polygon
    ignore::DeprecationWarning:websockets
    # Ignore NumPy reload warning from yfinance
    ignore::UserWarning:numpy
    # Ignore runpy RuntimeWarning from module execution tests
    ignore::RuntimeWarning
    # Ignore NumPy timedelta generic unit deprecation warnings
    ignore:The 'generic' unit for NumPy timedelta is deprecated:DeprecationWarning
