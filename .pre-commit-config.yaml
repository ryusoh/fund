exclude: |
    ^fund/|
    ^assets/vendor/|
    ^js/vendor/|
    ^node_modules/|
    ^venv/|
    ^.mypy_cache/|
    ^.ruff_cache/|
    ^coverage/|
    ^dist/|
    ^build/|
    ^data/|
    ^ai/status/

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: end-of-file-fixer
            # Do not touch generated data files or AI status files
            exclude: ^data/.*\.(csv|html|json|txt)$|^ai/status/|^js/vendor/
          - id: trailing-whitespace
            # Do not touch generated data files
            exclude: ^data/.*\.(csv|html|json|txt)$|^js/vendor/
          - id: mixed-line-ending
            # Do not touch generated data files
            exclude: ^data/.*\.(csv|html|json|txt)$
          - id: detect-private-key

    - repo: https://github.com/DavidAnson/markdownlint-cli2
      rev: v0.22.0
      hooks:
          - id: markdownlint-cli2
            args: ['--config', '.markdownlint.json', '#**/node_modules/**', '#venv/**', '#.qwen/**']

    # JavaScript tooling (commit): format + lint
    - repo: local
      hooks:
          - id: prettier
            name: prettier (staged files)
            entry: bash -lc 'if ! command -v npx >/dev/null 2>&1; then echo "npx missing; skipping Prettier"; exit 0; fi; npx --yes prettier --write --ignore-path .prettierignore --'
            language: system
            files: '\\.(js|css|json|yml|yaml|md|html)$'
            exclude: ^data/.*\.(html|json)$
            pass_filenames: true

    - repo: local
      hooks:
          - id: eslint
            name: eslint (staged JS)
            entry: bash -lc 'if ! command -v npx >/dev/null 2>&1; then echo "npx missing; skipping ESLint"; exit 0; fi; npx --yes eslint --max-warnings=0 --'
            language: system
            types_or: [javascript]
            pass_filenames: true

    - repo: local
      hooks:
          - id: stylelint
            name: stylelint (staged CSS)
            entry: bash -lc 'if ! command -v npx >/dev/null 2>&1; then echo "npx missing; skipping Stylelint"; exit 0; fi; npx --yes -p @stylistic/stylelint-plugin stylelint --formatter=unix --config-basedir "$(pwd)" --'
            language: system
            types_or: [css]
            pass_filenames: true

    # JS tests (commit): related tests only
    - repo: local
      hooks:
          - id: jest-related
            name: jest (related tests)
            entry: bash -lc 'if ! ls jest.config.* package.json >/dev/null 2>&1; then echo "No Jest config found, skipping"; exit 0; fi; if [ $# -gt 0 ]; then npx --yes jest --findRelatedTests --passWithNoTests "$@"; else npx --yes jest --passWithNoTests; fi'
            language: system
            types_or: [javascript]
            pass_filenames: true

    # Full test suites (push): JS + Python
    - repo: local
      hooks:
          - id: jest-full
            name: jest (full, pre-push)
            entry: bash -lc 'npx --yes jest --ci --runInBand'
            language: system
            pass_filenames: false
            stages: [pre-push]

    - repo: local
      hooks:
          - id: pytest-full
            name: pytest (full, pre-push)
            entry: bash -lc 'pytest -q'
            language: system
            pass_filenames: false
            stages: [pre-push]

    # Remind to deploy Cloudflare Worker after commits that touch worker/
    - repo: local
      hooks:
          - id: worker-deploy-reminder
            name: worker deploy reminder
            entry: bash -c "echo && echo 'worker/ changed -- remember to run make deploy-worker' && echo"
            language: system
            pass_filenames: false
            stages: [post-commit]
            files: '^worker/'

    # Optional: mypy type check on commit (adjust paths as needed)
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.18.2
      hooks:
          - id: mypy
            files: '^scripts/|^tests/python/'
            additional_dependencies: ['types-requests', 'types-pytz']
