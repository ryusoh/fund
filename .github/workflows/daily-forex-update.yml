name: Daily Forex Data Update

on:
    schedule:
        # Runs at 05:00 UTC every day. This time is chosen as it's typically
        # after US markets close and before European markets open, providing
        # a relatively stable daily rate.
        - cron: '0 5 * * *'
    workflow_dispatch: # Allows manual triggering from the Actions tab

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

permissions:
    contents: write # Required to commit changes back to the repository
    actions: write # Required to dispatch the Pages deploy workflow

jobs:
    fetch-and-commit-forex:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.x' # Use a recent Python 3 version

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Fetch forex data
              run: python scripts/data/fetch_forex.py

            - name: Commit and push changes
              id: autocommit
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'chore(data): 為替レートを自動更新 [skip ci]'
                  commit_author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
                  file_pattern: 'data/fx_data.json data/fx_daily_rates.csv' # Only commit if these files change

            # Bot pushes use GITHUB_TOKEN + [skip ci], so they never trigger the
            # push-based Pages deploy — dispatch it explicitly.
            - name: Trigger Pages deploy
              if: steps.autocommit.outputs.changes_detected == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh workflow run pages.yml --ref main
