name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    web-ci:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: '20'
            PYTHON_VERSION: '3.12'
            RUN_PRECOMMIT: 'true'
            RUN_DEPLOY: 'false'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: 'false'

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements-dev.txt ]; then
                    pip install -r requirements-dev.txt
                  fi

            - name: Show versions
              run: |
                  node -v
                  npm -v
                  python -V
                  make --version

            - name: Install Node dependencies
              if: ${{ hashFiles('package.json') != '' }}
              run: npm ci

            # Single source of truth: Makefile precommit-fix target
            # Any new checks added locally must be added to 'make precommit-fix'
            - name: Run precommit-fix (single source of truth)
              if: ${{ env.RUN_PRECOMMIT == 'true' }}
              run: make precommit-fix

            - name: Deploy (placeholder)
              if: ${{ env.RUN_DEPLOY == 'true' }}
              run: echo "Deploy step controlled by caller workflow"
